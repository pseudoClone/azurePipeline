name: Build and Deploy container application

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Yeet the code to Container
        uses: actions/checkout@v4

      - name: Azure CLI Login for Service Principle
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: ACR Login
        run: az acr login --name acrprincepipelinejune2026

      - name: Docker build and push
        run: |
          docker build -t acrprincepipelinejune2026.azurecr.io/serve-and-log-application:${{ github.sha }} .
          docker push acrprincepipelinejune2026.azurecr.io/serve-and-log-application:${{ github.sha }}
          docker push acrprincepipelinejune2026.azurecr.io/serve-and-log-application:latest
  
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}
      - name: Deploy application to Azure container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt
            az containerapp update \
              --name serve-and-log-cont-app \
              --resource-group rg_pipeline_project \
              --image acrprincepipelinejune2026.azurecr.io/serve-and-log-application:${{ github.sha }}